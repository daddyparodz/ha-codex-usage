name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff
        run: ruff check .
      - name: Python compile check
        run: python -m compileall -q custom_components

  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation deps
        run: |
          python -m pip install --upgrade pip
          pip install "homeassistant>=2024.4.0"
      - name: Validate manifest and importability
        run: |
          python - << 'PY'
          import importlib.util
          import json
          from pathlib import Path

          manifest = Path('custom_components/codex_usage/manifest.json')
          data = json.loads(manifest.read_text())
          required = ['domain', 'name', 'version', 'config_flow']
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Missing manifest keys: {missing}")

          files = [
              'custom_components/codex_usage/__init__.py',
              'custom_components/codex_usage/config_flow.py',
              'custom_components/codex_usage/coordinator.py',
              'custom_components/codex_usage/sensor.py',
          ]
          for f in files:
              spec = importlib.util.spec_from_file_location('mod', f)
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
          print('Validation passed')
          PY
