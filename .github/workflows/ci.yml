name: CI

on:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Ruff
        run: ruff check .
      - name: Python compile check
        run: python -m compileall -q custom_components

  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate manifest schema keys
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          manifest = Path('custom_components/codex_usage/manifest.json')
          data = json.loads(manifest.read_text())
          required = ['domain', 'name', 'version', 'config_flow']
          missing = [k for k in required if k not in data]
          if missing:
              raise SystemExit(f"Missing manifest keys: {missing}")
          print('Validation passed')
          PY
      - name: Python compile check
        run: python -m compileall -q custom_components
